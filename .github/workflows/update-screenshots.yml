name: Update E2E Screenshots

on:
  workflow_dispatch:

env:
  BRANCH_REF: ${{ github.head_ref || github.ref_name }}

jobs:
  update-screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_REF }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build packages
        run: bun run build

      - name: Install harness dependencies
        run: bun install --cwd e2e/harness

      - name: Update screenshots
        run: bun run test:e2e:update

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/screenshots/
          git diff --cached --quiet || git commit -m "chore: regenerate e2e screenshot baselines [ci skip]"
          git push
